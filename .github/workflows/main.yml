name: Wails build

on:
  push:
    tags:
    # Match any new tag
      - '*-release'
      - '*-dev'
      - '*-pre'

env:
  # Necessary for most environments as build failure can occur due to OOM issues
  NODE_OPTIONS: "--max-old-space-size=4096"
  OFFICIAL_STATEMENT: ${{ vars.OFFICIAL_STATEMENT }}
  BUILD_KEY: ${{ vars.BUILD_KEY }}

jobs:
  build:
    strategy:
    # Failure in one platform build won't impact the others
      fail-fast: false
      matrix:
        build:
          - name: 'go-stock-windows-amd64.exe'
            platform:  'windows/amd64'
            os: 'windows-latest'
          - name: 'go-stock-linux-amd64'
            platform: 'linux/amd64'
            os: 'ubuntu-latest'  # 使用最新的 Ubuntu，自动适配
          - name: 'go-stock-linux-arm64'
            platform: 'linux/arm64'
            os: 'ubuntu-latest'  # 使用最新的 Ubuntu，自动适配
          - name: 'go-stock-darwin-universal'
            platform: 'darwin/universal'
            os: 'macos-latest'
          - name: 'go-stock-darwin-intel'
            platform: 'darwin'
            os: 'macos-latest'
          - name: 'go-stock-darwin-arm64'
            platform: 'darwin/arm64'
            os: 'macos-latest'

    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          submodules: recursive

      # 为 Linux 安装 GUI 库依赖（自动适配 Ubuntu 版本）
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          # 检测 Ubuntu 版本，优先使用 webkit2gtk-4.1
          # lsb_release 在某些 runner 上不可用，使用 /etc/os-release 作为后备
          if command -v lsb_release &> /dev/null; then
            UBUNTU_VERSION=$(lsb_release -rs)
          else
            UBUNTU_VERSION=$(grep -oP 'VERSION_ID="\K[^"]+' /etc/os-release 2>/dev/null || echo "unknown")
          fi
          echo "Detected Ubuntu version: $UBUNTU_VERSION"

          sudo apt-get update

          # 优先尝试 libwebkit2gtk-4.1-dev（新版本），如果失败则回退到 4.0-dev
          # Ubuntu 24.04/22.04 使用 4.1，Ubuntu 20.04 使用 4.0
          if [[ "$UBUNTU_VERSION" == "24.04" ]] || [[ "$UBUNTU_VERSION" == "22.04" ]]; then
            echo "Installing dependencies for Ubuntu 22.04/24.04..."
            sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev gcc libglib2.0-dev || \
            sudo apt-get install -y libwebkit2gtk-4.0-dev libgtk-3-dev gcc libglib2.0-dev
          else
            # 对于其他版本或其他发行版，先尝试 4.1 再回退到 4.0
            echo "Installing dependencies..."
            sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev gcc libglib2.0-dev || \
            sudo apt-get install -y libwebkit2gtk-4.0-dev libgtk-3-dev gcc libglib2.0-dev
          fi

      - name: Get commit message (Windows)
        if: runner.os == 'Windows'
        id: get_commit_message_windows
        shell: pwsh
        run: |
          $commit_message = & git log -1 --pretty=format:"%s"
          echo "::set-output name=commit_message::$commit_message"

      - name: Get commit message (Linux/macOS)
        if: runner.os != 'Windows'
        id: get_commit_message_unix
        run: |
          echo "::set-output name=commit_message::$(git log -1 --pretty=format:"%s")"

      - name: Build wails x go-stock
        uses: ArvinLovegood/wails-build-action@v3.7
        id: build
        with:
          build-name: ${{ matrix.build.name }}
          build-platform: ${{ matrix.build.platform }}
          package: true
          go-version: '1.26'
          build-tags: ${{ github.ref_name }}
          build-commit-message: ${{ steps.get_commit_message_windows.outputs.commit_message || steps.get_commit_message_unix.outputs.commit_message }}
          build-statement: ${{ env.OFFICIAL_STATEMENT }}
          build-key: ${{ env.BUILD_KEY }}
          node-version: '20.x'
